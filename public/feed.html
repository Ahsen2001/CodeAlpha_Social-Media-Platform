<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus · Home Feed</title>
  <meta name="description" content="Your personal CodeAlpha feed – stay updated with everyone you follow.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="/feed.html" class="navbar-brand">CodeAlpha</a>
      <ul class="navbar-nav">
        <li>
          <a href="/feed.html" class="nav-link active">
            <i class="bi bi-house-door-fill"></i>
            <span>Home</span>
          </a>
        </li>
        <li>
          <a href="/create-post.html" class="nav-link">
            <i class="bi bi-plus-square"></i>
            <span>Post</span>
          </a>
        </li>
        <li>
          <a href="/profile.html" class="nav-link">
            <i class="bi bi-person-circle"></i>
            <span id="navUsername">Profile</span>
          </a>
        </li>
        <li>
          <button id="logoutBtn" class="btn btn-ghost btn-sm">
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
          </button>
        </li>
      </ul>
    </div>
  </nav>

  <!-- App Layout -->
  <div class="app-layout">

    <!-- Left Sidebar -->
    <aside class="sidebar">
      <!-- User Card -->
      <div class="card mb-2" style="padding:1rem;text-align:center">
        <div id="sidebarUserAvatar" style="margin:0 auto 0.6rem;display:flex;justify-content:center"></div>
        <div id="sidebarUsername" style="font-weight:700;font-size:0.95rem"></div>
        <a href="/profile.html" class="btn btn-secondary btn-sm btn-full mt-2">View Profile</a>
      </div>

      <!-- Sidebar Nav -->
      <nav>
        <ul class="sidebar-nav">
          <li>
            <a href="/feed.html" class="sidebar-link active">
              <i class="bi bi-house-door-fill"></i> Home
            </a>
          </li>
          <li>
            <a href="/profile.html" class="sidebar-link">
              <i class="bi bi-person"></i> Profile
            </a>
          </li>
          <li>
            <a href="/create-post.html" class="sidebar-link">
              <i class="bi bi-pencil-square"></i> Create Post
            </a>
          </li>
        </ul>
        <div class="sidebar-create-btn">
          <a href="/create-post.html" class="btn btn-primary btn-full">
            <i class="bi bi-plus-lg"></i> New Post
          </a>
        </div>
      </nav>
    </aside>

    <!-- Main Feed -->
    <main>
      <div id="feed" class="feed"></div>
      <div id="loadSentinel" style="height:20px;margin-top:1rem"></div>
    </main>

    <!-- Right Panel -->
    <aside class="right-panel">
      <div class="card suggestions-card">
        <div style="font-weight:700;margin-bottom:1rem;font-size:0.95rem">✨ Discover People</div>
        <p class="text-muted" style="font-size:0.85rem">Explore the platform to find interesting people to follow.</p>
        <a href="#" class="btn btn-secondary btn-sm btn-full mt-2">Browse Users</a>
      </div>
      <div class="card">
        <div style="font-weight:700;margin-bottom:0.5rem;font-size:0.9rem">📱 CodeAlpha Tips</div>
        <p class="text-muted" style="font-size:0.82rem;line-height:1.6">
          Like posts with ❤️, add comments, and follow users to build your personalized feed.
        </p>
      </div>
    </aside>

  </div>

  <script src="/js/api.js"></script>
  <script src="/js/feed.js"></script>
</body>

</html>
