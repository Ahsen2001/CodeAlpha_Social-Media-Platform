<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus · Sign In</title>
  <meta name="description" content="Join Nexus – a modern social platform. Connect, share, and follow.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-logo">
        <h1>⚡ Nexus</h1>
        <p>Connect with people who matter</p>
      </div>

      <div class="card">
        <div class="auth-tabs">
          <div class="auth-tab active" data-tab="login">Sign In</div>
          <div class="auth-tab" data-tab="register">Create Account</div>
        </div>

        <!-- Login Form -->
        <form id="loginForm" autocomplete="on">
          <div id="loginAlert" class="alert alert-danger"></div>
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPassword">Password</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="Your password" required autocomplete="current-password">
          </div>
          <button type="submit" id="loginSubmitBtn" class="btn btn-primary btn-full btn-lg mt-2">
            Sign In
          </button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="hidden" autocomplete="on">
          <div id="registerAlert" class="alert alert-danger"></div>
          <div class="form-group">
            <label class="form-label" for="regUsername">Username</label>
            <input type="text" id="regUsername" class="form-control" placeholder="cooluser42" required minlength="3" maxlength="50" autocomplete="username">
          </div>
          <div class="form-group">
            <label class="form-label" for="regEmail">Email</label>
            <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label class="form-label" for="regPassword">Password</label>
            <input type="password" id="regPassword" class="form-control" placeholder="Minimum 6 characters" required minlength="6" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label class="form-label" for="regConfirm">Confirm Password</label>
            <input type="password" id="regConfirm" class="form-control" placeholder="Repeat password" required autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg mt-2">
            Create Account
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
